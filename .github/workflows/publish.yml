name: Publish

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - run: nix profile install nixpkgs#devenv

      - run: devenv shell -- composer install --no-dev --no-interaction --prefer-dist

      - name: Build container
        run: devenv container build cli

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          VERSION="${{ github.ref_name }}"
          docker tag cli ghcr.io/junctionio/cli:${VERSION}
          docker tag cli ghcr.io/junctionio/cli:latest
          docker push ghcr.io/junctionio/cli:${VERSION}
          docker push ghcr.io/junctionio/cli:latest
