name: Publish

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - run: nix profile install nixpkgs#devenv

      - run: devenv shell -- composer install --no-dev --no-interaction --prefer-dist

      - name: Build and push image
        run: |
          VERSION="${{ github.ref_name }}"
          devenv container copy \
            --registry docker://ghcr.io/junctionio/ \
            --copy-args="--dest-creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            cli
          CONTAINERS_REGISTRIES_CONF=/dev/null nix run nixpkgs#skopeo -- copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker://ghcr.io/junctionio/cli:latest \
            docker://ghcr.io/junctionio/cli:${VERSION}
